<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Review Images — Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0b1430; color: #fff;
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 32px;
    }
    h1 { font-size: 20px; margin-bottom: 4px; color: #e0a832; }
    h2 { font-size: 14px; margin: 32px 0 14px; color: #e0a832; letter-spacing: 0.08em; text-transform: uppercase; }
    .sub { color: rgba(255,255,255,0.55); margin-bottom: 24px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    figure {
      background: #121a3a; border-radius: 12px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
    figure img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; }
    figcaption {
      padding: 10px 12px; font-size: 12px; color: rgba(255,255,255,0.82);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    figcaption b { color: #e0a832; font-weight: 700; }
    .note { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 4px; }
    .photo-reviewer { color: #8fb8ff; font-size: 11px; margin-top: 2px; }
  </style>
</head>
